<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>無料Zoom相談予約 — Hanu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500;1,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Noto+Serif+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* match main LP (v5) palette: white / cream / sage / ink */
      --greige:   #f5f4f0;  /* warm cream — page bg (was greige) */
      --greige2:  #f5f4f0;
      --navy:     #0e0e0c;  /* deep ink — accents/buttons (was navy) */
      --charcoal: #0e0e0c;  /* deep ink — text */
      --offwhite: #ffffff;  /* white — container bg (was cream) */
      --gold:     #8d928a;  /* sage gray — secondary accents (was gold) */
      --taupe:    #8d928a;  /* sage gray — labels */
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body {
      font-family: 'Noto Serif JP', serif;
      background: var(--gold);
      color: var(--charcoal);
      font-weight: 300;
      padding: 40px 16px;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .back-link {
      display: block;
      max-width: 720px;
      margin: 0 auto 16px;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--charcoal);
      text-decoration: none;
      opacity: 0.7;
    }
    .back-link:hover { opacity: 1; }
    .container {
      max-width: 720px;
      margin: 0 auto;
      background: var(--offwhite);
      padding: 48px 36px 56px;
      border-radius: 4px;
      box-shadow: 8px 10px 0 var(--navy);
    }
    .eyebrow {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--taupe);
      text-align: center;
      margin-bottom: 10px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 900;
      font-size: clamp(32px, 6vw, 46px);
      color: var(--navy);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 10px;
    }
    .subtitle {
      text-align: center;
      font-size: 16px;
      color: var(--charcoal);
      opacity: 1;
      margin-bottom: 36px;
      letter-spacing: 0.04em;
      line-height: 1.9;
      font-weight: 500;
    }
    .step {
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid rgba(28,25,24,0.14);
    }
    .step-label {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--taupe);
      margin-bottom: 6px;
    }
    .step-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 19px;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    /* Calendar */
    .month-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
    }
    .month-nav button {
      background: none;
      border: 1px solid rgba(28,25,24,0.25);
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: var(--charcoal);
      transition: all 0.2s;
    }
    .month-nav button:hover:not(:disabled) {
      background: var(--navy);
      color: var(--offwhite);
      border-color: var(--navy);
    }
    .month-nav button:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }
    .month-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 22px;
      color: var(--navy);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-wrap { position: relative; }
    .cal-wrap.coming-soon::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(141,146,138,0.28);
      pointer-events: none;
      border-radius: 2px;
    }
    .cs-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 2;
      pointer-events: none;
      padding: 22px 36px;
      background: var(--offwhite);
      border: 1px solid var(--gold);
      border-radius: 2px;
      box-shadow: 5px 6px 0 rgba(14,14,12,0.12);
    }
    .cs-overlay .cs-label {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 18px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--charcoal);
      font-weight: 500;
    }
    .cs-overlay .cs-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      margin-top: 8px;
      color: var(--gold);
    }
    .cal-header {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-align: center;
      padding: 8px 0;
      color: var(--taupe);
      font-weight: 500;
    }
    /* sun/sat header: inherit default sage from .cal-header (no color distinction) */
    .cal-cell {
      background: var(--white, #fff);
      background: #FFFFFF;
      border: 1px solid rgba(28,25,24,0.08);
      padding: 10px 0;
      text-align: center;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 500;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-width: 0;
    }
    .cal-cell.blank {
      background: transparent;
      border: none;
      cursor: default;
    }
    .cal-cell.disabled {
      cursor: not-allowed;
      background: #FFFFFF;
      color: rgba(28,25,24,0.3);
      flex-direction: column;
      gap: 1px;
      padding: 4px 2px;
    }
    .cal-cell.disabled .cell-num { font-size: 11px; line-height: 1; opacity: 0.7; }
    .cal-cell.disabled .sold {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 8.5px;
      letter-spacing: 0.12em;
      line-height: 1.15;
      color: var(--gold);
      font-weight: 600;
      text-align: center;
      white-space: nowrap;
    }
    .cal-cell.sun:not(.disabled):not(.blank),
    .cal-cell.sat:not(.disabled):not(.blank) { color: var(--gold); }
    .cal-cell:hover:not(.disabled):not(.blank):not(.selected) {
      background: var(--gold);
      color: var(--charcoal);
      border-color: var(--gold);
    }
    .cal-cell.selected {
      background: var(--navy) !important;
      color: var(--offwhite) !important;
      border-color: var(--navy);
      box-shadow: 3px 3px 0 rgba(28,25,24,0.2);
    }

    /* Slots */
    .slots {
      display: grid;
      gap: 10px;
    }
    .slot-btn {
      background: #FFFFFF;
      border: 1px solid rgba(28,25,24,0.2);
      padding: 18px 20px;
      text-align: left;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      font-weight: 400;
      color: var(--charcoal);
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .slot-btn .time {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }
    .slot-btn .dur {
      font-size: 11px;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--taupe);
    }
    .slot-btn:hover:not(.selected) {
      background: var(--gold);
      border-color: var(--gold);
    }
    .slot-btn.selected {
      background: var(--navy);
      color: var(--offwhite);
      border-color: var(--navy);
      box-shadow: 3px 3px 0 rgba(28,25,24,0.2);
    }
    .slot-btn.selected .dur { color: var(--gold); }
    .slot-btn .sold {
      display: none;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 13px;
      letter-spacing: 0.22em;
      color: var(--gold);
      font-weight: 600;
      text-transform: uppercase;
    }
    .slot-btn.disabled {
      cursor: not-allowed;
      color: rgba(28,25,24,0.45);
      background: #FFFFFF;
    }
    .slot-btn.disabled .time { color: rgba(28,25,24,0.45); }
    .slot-btn.disabled .dur { display: none; }
    .slot-btn.disabled .sold { display: inline; }
    .slot-btn.disabled:hover {
      background: #FFFFFF;
      border-color: rgba(28,25,24,0.2);
    }

    /* Form */
    .form-field {
      margin-bottom: 18px;
    }
    .form-field label {
      display: block;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--taupe);
      margin-bottom: 6px;
    }
    .form-field label .req {
      color: var(--gold);
      margin-left: 4px;
    }
    .form-field input,
    .form-field textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(28,25,24,0.2);
      background: #FFFFFF;
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      color: var(--charcoal);
      border-radius: 2px;
      transition: border-color 0.2s;
    }
    .form-field input:focus,
    .form-field textarea:focus {
      outline: none;
      border-color: var(--navy);
    }
    .form-field textarea { resize: vertical; min-height: 90px; }

    .checkbox-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }
    @media (max-width: 540px) {
      .checkbox-group { grid-template-columns: 1fr; }
    }
    .check-item {
      display: flex !important;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid rgba(28,25,24,0.2);
      background: #FFFFFF;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Noto Serif JP', serif !important;
      font-size: 14px !important;
      letter-spacing: 0 !important;
      text-transform: none !important;
      color: var(--charcoal) !important;
      margin-bottom: 0 !important;
      transition: border-color 0.15s, background 0.15s;
    }
    .check-item:hover { border-color: var(--navy); }
    .check-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid rgba(28,25,24,0.35);
      border-radius: 2px;
      background: #FFFFFF;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      margin: 0;
    }
    .check-item input[type="checkbox"]:checked {
      background: var(--navy);
      border-color: var(--navy);
    }
    .check-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 0px;
      width: 6px;
      height: 11px;
      border-right: 2px solid var(--offwhite);
      border-bottom: 2px solid var(--offwhite);
      transform: rotate(45deg);
    }
    .check-item input[type="checkbox"]:checked + span {
      color: var(--navy);
      font-weight: 500;
    }

    .submit-btn {
      display: block;
      width: 100%;
      background: var(--navy);
      color: var(--offwhite);
      border: none;
      padding: 18px 24px;
      font-family: 'Noto Serif JP', serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.12em;
      cursor: pointer;
      border-radius: 2px;
      margin-top: 8px;
      transition: background 0.2s;
      text-decoration: none;
      text-align: center;
      box-shadow: 3px 4px 0 rgba(28,25,24,0.2);
    }
    .submit-btn:hover { background: var(--charcoal); }
    .submit-btn.gold {
      background: var(--gold);
      color: var(--navy);
    }
    .submit-btn.gold:hover { background: #6f7370; }
    .submit-btn.ig {
      background: #E4405F;
      color: #fff;
      margin-top: 10px;
    }
    .submit-btn.ig:hover { background: #C7324D; }

    /* Confirmation */
    .confirm-card {
      background: var(--navy);
      color: var(--offwhite);
      padding: 28px 24px;
      border-radius: 3px;
      margin-bottom: 22px;
      box-shadow: 5px 6px 0 rgba(28,25,24,0.25);
    }
    .confirm-card .row {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      font-size: 14px;
      line-height: 1.7;
    }
    .confirm-card .row:last-child { border-bottom: none; }
    .confirm-card .row .label {
      flex-shrink: 0;
      width: 90px;
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--gold);
      padding-top: 3px;
    }
    .confirm-card .row .val {
      flex: 1;
      word-break: break-all;
    }
    .confirm-card .row .val.hl {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-style: italic;
      font-weight: 700;
      color: var(--offwhite);
    }
    .confirm-greeting {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 18px;
      letter-spacing: 0.04em;
    }
    .dm-text-box {
      background: #FFF;
      border: 1px dashed rgba(28,25,24,0.3);
      padding: 16px;
      font-family: 'Noto Serif JP', serif;
      font-size: 13px;
      line-height: 1.85;
      color: var(--charcoal);
      white-space: pre-wrap;
      border-radius: 2px;
      margin-bottom: 10px;
      cursor: copy;
    }
    .dm-text-label {
      font-family: 'Bodoni Moda', 'Playfair Display', serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--taupe);
      margin-bottom: 6px;
    }
    .copy-hint {
      font-size: 11px;
      color: var(--taupe);
      text-align: center;
      margin-top: 4px;
    }

    .hidden { display: none !important; }

    @media (max-width: 540px) {
      body { padding: 16px 8px; }
      .container { padding: 32px 14px 36px; box-shadow: 5px 6px 0 var(--navy); }
      h1 { font-size: 30px; }
      .subtitle { font-size: 14px; line-height: 1.8; }
      .month-label { font-size: 18px; }
      .cal-grid { gap: 3px; }
      .cal-cell { font-size: 14px; padding: 6px 0; }
      .cal-header { font-size: 10px; padding: 6px 0; }
      .cal-cell.disabled { padding: 3px 1px; gap: 1px; }
      .cal-cell.disabled .cell-num { font-size: 12px; opacity: 0.55; text-decoration: line-through; }
      .cal-cell.disabled .sold { display: none; }
      .cs-overlay { padding: 14px 20px; }
      .cs-overlay .cs-label { font-size: 14px; letter-spacing: 0.2em; }
      .cs-overlay .cs-sub { font-size: 11px; }
      .slot-btn { padding: 14px 16px; }
      .slot-btn .time { font-size: 19px; }
      .confirm-card { padding: 22px 18px; }
      .confirm-card .row { flex-direction: column; gap: 2px; padding: 8px 0; }
      .confirm-card .row .label { width: auto; }
      .confirm-card .row .val { word-break: normal; overflow-wrap: anywhere; }
      .confirm-card .row .val.hl { font-size: 16px; line-height: 1.4; }
    }

    @media (max-width: 380px) {
      .container { padding: 28px 12px 32px; }
      .cal-cell { font-size: 13px; }
      .cal-cell.disabled .cell-num { font-size: 11px; }
    }
  </style>
</head>
<body>

<a href="/" class="back-link">‹ back to Hanu</a>

<div class="container">
  <div class="eyebrow">— Free Zoom Consultation —</div>
  <h1>Reserve a Talk.</h1>
  <p class="subtitle">
    無料Zoom相談のご予約<br>
    ご都合の良い日時をお選びください
  </p>

  <!-- STEP 1: Date -->
  <div id="step1" class="step" style="border-top:none; padding-top:0; margin-top:0;">
    <div class="step-label">Step 1</div>
    <div class="step-title">日付を選択してください</div>
    <div class="month-nav">
      <button id="prevMonth" aria-label="前の月">‹</button>
      <div class="month-label" id="monthLabel">2026年 5月</div>
      <button id="nextMonth" aria-label="次の月">›</button>
    </div>
    <div class="cal-wrap" id="calWrap">
      <div class="cal-grid" id="calendar"></div>
    </div>
  </div>

  <!-- STEP 2: Time -->
  <div id="step2" class="step hidden">
    <div class="step-label">Step 2</div>
    <div class="step-title">時間帯を選択してください</div>
    <div class="slots">
      <button class="slot-btn" data-slot="11:00-11:30"><span class="time">11:00 – 11:30</span><span class="dur">30 min</span><span class="sold">— SOLD OUT —</span></button>
      <button class="slot-btn" data-slot="21:00-21:30"><span class="time">21:00 – 21:30</span><span class="dur">30 min</span><span class="sold">— SOLD OUT —</span></button>
    </div>
  </div>

  <!-- STEP 3: Form -->
  <div id="step3" class="step hidden">
    <div class="step-label">Step 3</div>
    <div class="step-title">お客様情報をご入力ください</div>
    <form id="bookingForm">
      <div class="form-field">
        <label>お名前（漢字）<span class="req">*</span></label>
        <input type="text" id="name" required autocomplete="name" placeholder="山田 花子">
      </div>
      <div class="form-field">
        <label>お名前（カタカナ）<span class="req">*</span></label>
        <input type="text" id="nameKana" required autocomplete="off" placeholder="ヤマダ ハナコ" pattern="^[\u30A0-\u30FF\s　ー]+$" title="カタカナで入力してください">
      </div>
      <div class="form-field">
        <label>メールアドレス<span class="req">*</span></label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-field">
        <label>Instagramアカウント（任意）</label>
        <input type="text" id="instagram" placeholder="@your_account" autocomplete="off">
      </div>
      <div class="form-field">
        <label>パーティー内容（複数選択可）<span class="req">*</span></label>
        <div class="checkbox-group" id="partyTypeGroup">
          <label class="check-item"><input type="checkbox" name="partyType" value="出版パーティー"><span>出版パーティー</span></label>
          <label class="check-item"><input type="checkbox" name="partyType" value="周年パーティー"><span>周年パーティー</span></label>
          <label class="check-item"><input type="checkbox" name="partyType" value="コミュニティパーティー"><span>コミュニティパーティー</span></label>
          <label class="check-item"><input type="checkbox" name="partyType" value="お誕生日会"><span>お誕生日会</span></label>
          <label class="check-item"><input type="checkbox" name="partyType" value="記念日・節目"><span>記念日・節目</span></label>
          <label class="check-item"><input type="checkbox" name="partyType" value="検討中"><span>検討中</span></label>
        </div>
      </div>
      <div class="form-field">
        <label>ご相談内容（任意）</label>
        <textarea id="message" rows="4" placeholder="パーティーのイメージ、人数、気になっていることなど"></textarea>
      </div>
      <button type="submit" class="submit-btn">予約内容を確認</button>
    </form>
  </div>

  <!-- STEP 4: Confirmation -->
  <div id="step4" class="step hidden">
    <div class="step-label">Step 4</div>
    <div class="step-title">ご予約内容の送信</div>

    <div class="confirm-greeting" id="confirmGreeting"></div>

    <div class="confirm-card" id="confirmCard"></div>

    <a id="emailLink" href="#" class="submit-btn gold">✉ メールで送信する</a>
  </div>

</div>

<script>
  const SLOTS = ['11:00-11:30', '21:00-21:30'];
  const MONTHS = [
    { year: 2026, month: 5, label: '2026年 5月' },
    { year: 2026, month: 6, label: '2026年 6月' },
    { year: 2026, month: 7, label: '2026年 7月', comingSoon: true },
    { year: 2026, month: 8, label: '2026年 8月', comingSoon: true }
  ];
  const DAY_LABELS = ['日','月','火','水','木','金','土'];

  const BOOKING_EMAIL = 'hanuparty.08@gmail.com';

  const BLOCKED_DATES = new Set([
    '2026-05-02','2026-05-07','2026-05-08','2026-05-09','2026-05-10','2026-05-12','2026-05-13',
    '2026-05-15','2026-05-22','2026-05-23','2026-05-24','2026-05-27','2026-05-28','2026-05-30',
    '2026-06-01','2026-06-02','2026-06-15','2026-06-16','2026-06-17',
    '2026-06-18','2026-06-20','2026-06-21'
  ]);

  // per-date disabled slots (date -> Set of slot strings NG)
  const BLOCKED_SLOTS = {};
  const _addNgSlot = (iso, slot) => {
    if (!BLOCKED_SLOTS[iso]) BLOCKED_SLOTS[iso] = new Set();
    BLOCKED_SLOTS[iso].add(slot);
  };
  [
    '2026-05-03','2026-05-04','2026-05-05',
    '2026-05-14','2026-05-16','2026-05-17','2026-05-19','2026-05-20',
    '2026-05-21','2026-05-25','2026-05-26','2026-05-27'
  ].forEach(d => _addNgSlot(d, '11:00-11:30'));
  [
    '2026-05-01','2026-05-08','2026-05-10','2026-05-12',
    '2026-05-18','2026-05-29','2026-05-30'
  ].forEach(d => _addNgSlot(d, '21:00-21:30'));

  let monthIdx = 0;
  let sel = { date: null, dateLabel: null, slot: null };

  const $ = id => document.getElementById(id);

  function renderCalendar() {
    const m = MONTHS[monthIdx];
    $('monthLabel').textContent = m.label;
    $('prevMonth').disabled = monthIdx === 0;
    $('nextMonth').disabled = monthIdx === MONTHS.length - 1;

    const wrap = $('calWrap');
    wrap.classList.toggle('coming-soon', !!m.comingSoon);
    wrap.querySelectorAll('.cs-overlay').forEach(el => el.remove());

    const cal = $('calendar');
    cal.innerHTML = '';

    DAY_LABELS.forEach((d, i) => {
      const h = document.createElement('div');
      h.className = 'cal-header' + (i === 0 ? ' sun' : i === 6 ? ' sat' : '');
      h.textContent = d;
      cal.appendChild(h);
    });

    const firstDay = new Date(m.year, m.month - 1, 1).getDay();
    const lastDate = new Date(m.year, m.month, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const blank = document.createElement('div');
      blank.className = 'cal-cell blank';
      cal.appendChild(blank);
    }

    for (let d = 1; d <= lastDate; d++) {
      const dow = new Date(m.year, m.month - 1, d).getDay();
      const iso = `${m.year}-${String(m.month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isBlocked = BLOCKED_DATES.has(iso);
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cal-cell' + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '') + (isBlocked ? ' disabled' : '');
      if (m.comingSoon) {
        cell.textContent = d;
        cell.disabled = true;
        cell.style.cursor = 'default';
      } else if (isBlocked) {
        cell.innerHTML = `<span class="cell-num">${d}</span><span class="sold">— SOLD OUT —</span>`;
        cell.disabled = true;
        cell.title = '予約不可';
      } else {
        cell.textContent = d;
        cell.onclick = () => {
          document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected'));
          cell.classList.add('selected');
          sel.date = iso;
          sel.dateLabel = `${m.year}年 ${m.month}月${d}日（${DAY_LABELS[dow]}）`;
          refreshSlots(iso);
          $('step2').classList.remove('hidden');
          $('step2').scrollIntoView({ behavior: 'smooth', block: 'start' });
        };
      }
      cal.appendChild(cell);
    }

    if (m.comingSoon) {
      const overlay = document.createElement('div');
      overlay.className = 'cs-overlay';
      overlay.innerHTML = `
        <div class="cs-label">— Coming Soon —</div>
        <div class="cs-sub">近日公開予定</div>
      `;
      wrap.appendChild(overlay);
    }
  }

  $('prevMonth').onclick = () => { if (monthIdx > 0) { monthIdx--; renderCalendar(); } };
  $('nextMonth').onclick = () => { if (monthIdx < MONTHS.length - 1) { monthIdx++; renderCalendar(); } };

  function refreshSlots(iso) {
    const ng = BLOCKED_SLOTS[iso] || new Set();
    document.querySelectorAll('.slot-btn').forEach(btn => {
      const s = btn.dataset.slot;
      const blocked = ng.has(s);
      btn.classList.toggle('disabled', blocked);
      btn.disabled = blocked;
      btn.title = blocked ? '予約不可' : '';
      if (blocked && btn.classList.contains('selected')) {
        btn.classList.remove('selected');
        sel.slot = null;
      }
    });
  }

  document.querySelectorAll('.slot-btn').forEach(btn => {
    btn.onclick = () => {
      if (btn.disabled || btn.classList.contains('disabled')) return;
      document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      sel.slot = btn.dataset.slot;
      $('step3').classList.remove('hidden');
      $('step3').scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
  });

  $('bookingForm').onsubmit = (e) => {
    e.preventDefault();
    const name = $('name').value.trim();
    const nameKana = $('nameKana').value.trim();
    const email = $('email').value.trim();
    const instagram = $('instagram').value.trim();
    const message = $('message').value.trim();
    const partyTypes = Array.from(
      document.querySelectorAll('input[name="partyType"]:checked')
    ).map(el => el.value);

    if (partyTypes.length === 0) {
      alert('パーティー内容を1つ以上選択してください。');
      return;
    }
    const partyTypeText = partyTypes.join('、');

    $('confirmGreeting').textContent = `${name}様`;

    $('confirmCard').innerHTML = `
      <div class="row"><div class="label">Date</div><div class="val hl">${sel.dateLabel}</div></div>
      <div class="row"><div class="label">Time</div><div class="val hl">${sel.slot}</div></div>
      <div class="row"><div class="label">Name</div><div class="val">${escapeHtml(name)}（${escapeHtml(nameKana)}）</div></div>
      <div class="row"><div class="label">Email</div><div class="val">${escapeHtml(email)}</div></div>
      ${instagram ? `<div class="row"><div class="label">Instagram</div><div class="val">${escapeHtml(instagram)}</div></div>` : ''}
      <div class="row"><div class="label">Party</div><div class="val">${escapeHtml(partyTypeText)}</div></div>
      ${message ? `<div class="row"><div class="label">Message</div><div class="val">${escapeHtml(message).replace(/\n/g,'<br>')}</div></div>` : ''}
    `;

    const subject = `【Zoom相談予約】${sel.dateLabel} ${sel.slot}`;
    const body =
      `Hanu様\n\n下記の日時で無料Zoom相談を予約させていただきたく、ご連絡いたします。\n\n` +
      `■ ご希望日時\n${sel.dateLabel} ${sel.slot}\n\n` +
      `■ お名前\n${name}（${nameKana}）\n\n` +
      `■ メールアドレス\n${email}\n` +
      (instagram ? `\n■ Instagram\n${instagram}\n` : '') +
      `\n■ パーティー内容\n${partyTypeText}\n` +
      (message ? `\n■ ご相談内容\n${message}\n` : '') +
      `\nZoom URLのご返信をお待ちしております。\nよろしくお願いいたします。\n`;

    $('emailLink').href = `mailto:${BOOKING_EMAIL}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    $('step4').classList.remove('hidden');
    $('step4').scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  renderCalendar();
</script>

</body>
</html>
